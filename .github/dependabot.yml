version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      eslint-toolchain:
        patterns:
          - "eslint"
          - "@typescript-eslint/*"
      typescript-toolchain:
        patterns:
          - "typescript"
          - "@types/node"
    ignore:
      - dependency-name: "@types/node"
        update-types:
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
